<script>
document.addEventListener('DOMContentLoaded', async () => {
  const duas = await loadDuas();
  // Rotate dua of the day by day of year
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const dua = duas[dayOfYear % duas.length];
  document.getElementById('dua-of-day').innerHTML = `
    <div class="card dua-card" onclick="openDua('${dua.id}')">
      <div class="flex items-center justify-between mb-1">
        <span class="tag">Dua of the day</span>
        <span class="text-subtle text-sm">${dua.source}</span>
      </div>
      <div class="dua-arabic mt-1">${dua.arabic}</div>
      <div class="transliteration mt-1">${dua.transliteration}</div>
      <p class="text-sm mt-1">${dua.translation}</p>
    </div>`;
});
</script>
