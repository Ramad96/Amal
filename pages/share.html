<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umrah Sharing — Amal</title>
  <meta name="theme-color" content="#A0601A">
  <link rel="manifest" href="../manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .share-link-box {
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      word-break: break-all;
      color: var(--accent-text);
      font-family: var(--font-ui);
      margin: 0.75rem 0;
    }
  </style>
</head>
<body>

<main class="page">
  <div class="page-header">
    <h1>Umrah Sharing</h1>
    <p>Going on Umrah or Hajj? Create a link so loved ones can send you duas to make on their behalf.</p>
  </div>

  <!-- Create new list -->
  <div class="card" id="create-section">
    <h3 style="margin-bottom:0.75rem;">Create a sharing link</h3>
    <div class="field">
      <label>Label (optional)</label>
      <input type="text" id="list-label" placeholder="e.g. Ramiz's Umrah — March 2025">
    </div>
    <button class="btn btn-primary" onclick="createList()">Generate link</button>
  </div>

  <!-- My existing lists -->
  <div id="my-lists"></div>
</main>

<nav>
  <a href="../index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    Home
  </a>
  <a href="browse.html">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    Browse
  </a>
  <a href="library.html">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    Library
  </a>
  <a href="share.html" class="active">
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    Sharing
  </a>
  <a href="board.html">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    Board
  </a>
</nav>

<div id="toast"></div>

<script src="../js/app.js"></script>
<script src="../js/sharing.js"></script>
<script>
document.addEventListener('DOMContentLoaded', renderMyLists);

function createList() {
  const label = document.getElementById('list-label').value.trim();
  const id = Sharing.createList(label);
  document.getElementById('list-label').value = '';
  renderMyLists();
  showToast('Link created!');
  // Scroll to the new list
  setTimeout(() => document.getElementById('list-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

function renderMyLists() {
  const lists = Sharing.getMyLists();
  const el = document.getElementById('my-lists');
  if (!lists.length) { el.innerHTML = ''; return; }

  el.innerHTML = `<h3 style="margin:1.5rem 0 0.75rem;font-size:1rem;font-weight:500;">Your sharing links</h3>` +
    lists.map(list => {
      const url = Sharing.getShareUrl(list.id);
      const count = list.requests.length;
      return `
        <div class="card" id="list-${list.id}">
          <div class="flex justify-between items-center">
            <div>
              <p style="font-weight:500;font-size:0.95rem;">${list.label}</p>
              <p class="text-sm text-muted mt-1">${count} dua request${count !== 1 ? 's' : ''}</p>
            </div>
            <button class="btn btn-ghost text-sm" onclick="deleteList('${list.id}')">Delete</button>
          </div>
          <div class="share-link-box">${url}</div>
          <div class="flex gap-1" style="flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="copyLink('${url}')">Copy link</button>
            <a href="${url}" class="btn" target="_blank">View requests</a>
            <button class="btn btn-ghost" onclick="shareWhatsApp('${url}', '${list.label}')">Share via WhatsApp</button>
          </div>
          ${count > 0 ? `
          <hr class="divider">
          <p class="text-sm text-muted mb-1">Recent requests:</p>
          ${list.requests.slice(0, 3).map(r => `
            <div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.88rem;">
              <strong>${r.name}</strong>: ${r.dua}
            </div>`).join('')}
          ${count > 3 ? `<p class="text-subtle text-sm mt-1">+ ${count - 3} more — <a href="${url}" style="color:var(--accent);">view all</a></p>` : ''}
          ` : ''}
        </div>`;
    }).join('');
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
}

function shareWhatsApp(url, label) {
  const msg = `Assalamu alaikum! I'm going on Umrah. Please send me your duas and I'll make them on your behalf in sha Allah 🤲\n\n${url}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function deleteList(id) {
  if (!confirm('Delete this sharing link? This cannot be undone.')) return;
  Sharing.deleteList(id);
  renderMyLists();
  showToast('Link deleted');
}
</script>
</body>
</html>
