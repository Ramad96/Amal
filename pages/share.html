    Sharing

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sharing.js"></script>
<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let shareFilter = 'all';

Auth.onChange(async (user) => {
  renderCreateSection(user);
  if (user) {
    await renderMyLists();
  } else {
    document.getElementById('my-lists').innerHTML = '';
  }
});

function renderCreateSection(user) {
  const el = document.getElementById('create-section');
  if (!user) {
    el.innerHTML = `
      <h3 style="margin-bottom:0.5rem;">Create a sharing link</h3>
      <p class="text-sm text-muted" style="margin-bottom:1rem;">Sign in to generate a link for your Umrah or Hajj.</p>
      <button class="btn" onclick="Auth.signIn()" style="display:inline-flex;align-items:center;gap:0.5rem;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>`;
  } else {
    el.innerHTML = `
      <h3 style="margin-bottom:0.75rem;">Create a sharing link</h3>
      <div class="field">
        <label>Label (optional)</label>
        <input type="text" id="list-label" placeholder="e.g. Adam's Umrah — March 2025">
      </div>
      <button class="btn btn-primary" onclick="createList()">Generate link</button>`;
  }
}

async function createList() {
  const label = document.getElementById('list-label')?.value.trim();
  const id = await Sharing.createList(label);
  if (!id) return;
  document.getElementById('list-label').value = '';
  showToast('Link created!');
  await renderMyLists();
  setTimeout(() => document.getElementById('list-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
}

async function renderMyLists() {
  const el = document.getElementById('my-lists');
  const lists = await Sharing.getMyLists();
  if (!lists.length) { el.innerHTML = ''; return; }

  const filtered = shareFilter === 'all' ? lists : lists.filter(l => l.status === shareFilter);

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin:1.5rem 0 0.75rem;flex-wrap:wrap;gap:0.5rem;">
      <h3 style="font-size:1rem;font-weight:500;">Your sharing links</h3>
      <div class="chips" style="margin:0;">
        <button class="chip ${shareFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
        <button class="chip ${shareFilter==='open'?'active':''}" onclick="setFilter('open')">Open</button>
        <button class="chip ${shareFilter==='closed'?'active':''}" onclick="setFilter('closed')">Closed</button>
      </div>
    </div>
    ${filtered.length ? filtered.map(list => {
      const url = Sharing.getShareUrl(list.id);
      const active = list.requests.filter(r => !r.dismissed);
      const count = active.length;
      const isOpen = list.status === 'open';
      return `
        <div class="card" id="list-${list.id}">
          <div class="flex justify-between items-center">
            <div>
              <p style="font-weight:500;font-size:0.95rem;">${esc(list.label)}</p>
              <p class="text-sm text-muted mt-1">${count} dua request${count !== 1 ? 's' : ''}</p>
            </div>
            <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
              <span class="tag ${isOpen ? '' : 'muted'}">${isOpen ? 'Open' : 'Closed'}</span>
              <button class="btn btn-ghost text-sm" onclick="deleteList('${list.id}')">Delete</button>
            </div>
          </div>
          <div class="share-link-box">${url}</div>
          <div class="flex gap-1" style="flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="copyLink('${esc(url)}')">Copy link</button>
            <a href="${esc(url)}" class="btn">View requests</a>
            <button class="btn btn-ghost" onclick="toggleStatus('${list.id}','${list.status}')">${isOpen ? 'Close link' : 'Reopen link'}</button>
            <button class="btn btn-ghost" onclick="shareWhatsApp('${esc(url)}','${esc(list.label)}')">WhatsApp</button>
          </div>
        </div>`;
    }).join('') : `<p class="text-muted text-sm">No ${shareFilter === 'all' ? '' : shareFilter + ' '}links.</p>`}`;
}

function setFilter(f) {
  shareFilter = f;
  renderMyLists();
}

async function toggleStatus(listId, currentStatus) {
  await Sharing.toggleStatus(listId, currentStatus);
  showToast(currentStatus === 'open' ? 'Link closed' : 'Link reopened');
  await renderMyLists();
}

async function deleteList(id) {
  if (!confirm('Delete this sharing link? All requests will also be deleted.')) return;
  await Sharing.deleteList(id);
  showToast('Link deleted');
  await renderMyLists();
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
}

function shareWhatsApp(url, label) {
  const msg = `Assalamu alaikum! I'm going on Umrah. Please send me your duas and I'll make them on your behalf in sha Allah 🤲\n\n${url}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}
</script>
