<script>
let allDuas = [];
let activeCategory = 'all';
let query = '';

document.addEventListener('DOMContentLoaded', async () => {
  allDuas = await loadDuas();
  renderChips();
  render();

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value.toLowerCase();
    render();
  });
});

function renderChips() {
  const cats = ['all', ...Object.keys(CATEGORIES)];
  const used = new Set(allDuas.flatMap(d => d.categories));
  const visible = cats.filter(c => c === 'all' || used.has(c));
  document.getElementById('chips').innerHTML = visible.map(c => {
    const label = c === 'all' ? 'All' : (CATEGORIES[c]?.label || c);
    return `<button class="chip ${c === activeCategory ? 'active' : ''}" onclick="filterCat('${c}')">${label}</button>`;
  }).join('');
}

function filterCat(cat) {
  activeCategory = cat;
  renderChips();
  render();
}

function render() {
  let duas = allDuas;
  if (activeCategory !== 'all') duas = duas.filter(d => d.categories?.includes(activeCategory));
  if (query) duas = duas.filter(d =>
    d.translation.toLowerCase().includes(query) ||
    d.transliteration.toLowerCase().includes(query) ||
    d.occasion?.toLowerCase().includes(query)
  );

  if (!duas.length) {
    document.getElementById('list').innerHTML = `<div class="empty"><h3>No duas found</h3><p>Try a different search or category.</p></div>`;
    return;
  }

  document.getElementById('list').innerHTML = duas.map(d => renderDuaCard(d)).join('');
}
</script>
