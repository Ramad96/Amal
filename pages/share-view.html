    .pilgrim-hero { text-align:center; padding: 2.5rem 0 1.5rem; }
    .kaaba-icon { font-size: 3rem; display:block; margin-bottom:0.75rem; }
    .request-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.1rem; margin-bottom:0.65rem; }
    .requester-name { font-weight:500; font-size:0.95rem; }
    .request-dua { color:var(--text-muted); font-size:0.9rem; margin-top:0.3rem; line-height:1.6; }
    .request-actions { display:flex; gap:0.5rem; margin-top:0.75rem; flex-wrap:wrap; }
    .confirm-msg { text-align:center; padding:1.5rem; background:var(--accent-light); border:1px solid var(--border-gold); border-radius:var(--radius-lg); margin-bottom:1rem; }
    .confirm-msg p { color:var(--accent-text); }
  </style>
</head>
<body>

<main class="page">
  <div class="pilgrim-hero">
    <span class="kaaba-icon">🕋</span>
    <h1 id="list-title">Loading…</h1>
    <p id="list-sub" class="text-muted"></p>
  </div>

  <div id="submit-area"></div>

  <hr class="divider" id="divider" style="display:none;">

  <div id="requests-list"></div>
</main>

<footer>

</footer>

<nav>

    Home

  <a href="library.html">

    My Library

    Browse

    Sharing
  </a>
  <a href="settings.html">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sync.js"></script>
<script src="../js/library.js"></script>
<script src="../js/sharing.js"></script>
<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let listId = null;
let listData = null;

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  listId = params.get('id');
  if (!listId) { renderNotFound(); return; }
  listData = await Sharing.getList(listId);
  render();
});

// Re-render when auth resolves so owner actions appear without a page refresh
Auth.onChange(() => { if (listData) render(); });

function render() {
  if (!listData) { renderNotFound(); return; }

  const isOwner = listData.user_id === Auth.getUser()?.id;
  const isClosed = listData.status === 'closed';
  const active = listData.requests.filter(r => !r.dismissed);

  document.title = listData.label + ' — Amal';
  document.getElementById('list-title').textContent = listData.label;
  document.getElementById('list-sub').textContent = active.length
    ? `${active.length} dua request${active.length !== 1 ? 's' : ''} waiting`
    : isOwner ? 'No requests yet — share your link to receive duas'
               : 'No requests yet — be the first to send one';

  // Submit area
  const submitEl = document.getElementById('submit-area');
  if (isOwner) {
    submitEl.innerHTML = '';
  } else if (isClosed) {
    submitEl.innerHTML = `
      <div class="card" style="text-align:center;padding:1.5rem;">
        <p style="font-size:1.3rem;margin-bottom:0.5rem;">🕌</p>
        <p class="text-muted text-sm">This sharing link is closed — no new requests are being accepted right now.</p>
      </div>`;
  } else {
    submitEl.innerHTML = `
      <div class="card" id="request-form">
        <h3 style="margin-bottom:0.75rem;">Send a dua request</h3>
        <div class="field">
          <label>Your name (optional)</label>
          <input type="text" id="req-name" placeholder="Anonymous">
        </div>
        <div class="field">
          <label>Your dua request</label>
          <textarea id="req-dua" placeholder="e.g. Please make dua for my mother's health…"></textarea>
        </div>
        <button class="btn btn-primary" onclick="submitRequest()">Send request 🤲</button>
      </div>`;
  }

  // Requests list
  const listEl = document.getElementById('requests-list');
  document.getElementById('divider').style.display = (active.length || isOwner) ? '' : 'none';

  if (!active.length) { listEl.innerHTML = ''; return; }

  listEl.innerHTML = (isOwner
    ? `<p class="text-muted text-sm mb-2" style="font-weight:500;">Tap Save to add a request to your library</p>`
    : `<p class="text-muted text-sm mb-2" style="font-weight:500;">All requests (${active.length})</p>`) +
    active.map(r => {
      const alreadySaved = r.saved || Library.list().some(d => d.fromSharing && d.custom_text === r.dua);
      const actions = isOwner ? `
        <div class="request-actions">
          ${alreadySaved
            ? `<span class="tag">✓ Saved to library</span>`
            : `<button class="btn btn-primary" style="font-size:0.85rem;padding:0.4rem 0.9rem;" onclick="saveReq('${r.id}','${esc(r.dua)}','${esc(r.name)}')">Save to library</button>`}
          <button class="btn btn-ghost" style="font-size:0.85rem;padding:0.4rem 0.9rem;" onclick="dismissReq('${r.id}')">Dismiss</button>
        </div>` : '';
      return `
        <div class="request-card" id="req-${r.id}">
          <div class="requester-name">${esc(r.name)}</div>
          <div class="request-dua">${esc(r.dua)}</div>
          <p class="text-subtle text-sm mt-1">${new Date(r.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}</p>
          ${actions}
        </div>`;
    }).join('');
}

function renderNotFound() {
  document.getElementById('list-title').textContent = 'Link not found';
  document.getElementById('list-sub').textContent = 'This link may have been deleted or hasn\'t been set up yet.';
  document.getElementById('divider').style.display = 'none';
}

function showRequestForm() {
  document.getElementById('submit-area').innerHTML = `
    <div class="card" id="request-form">
      <h3 style="margin-bottom:0.75rem;">Send a dua request</h3>
      <div class="field">
        <label>Your name (optional)</label>
        <input type="text" id="req-name" placeholder="Anonymous">
      </div>
      <div class="field">
        <label>Your dua request</label>
        <textarea id="req-dua" placeholder="e.g. Please make dua for my mother's health…"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitRequest()">Send request 🤲</button>
    </div>`;
}

async function submitRequest() {
  const name = document.getElementById('req-name').value.trim() || 'Anonymous';
  const dua  = document.getElementById('req-dua').value.trim();
  if (!dua) { showToast('Please write your dua request'); return; }

  const ok = await Sharing.addRequest(listId, name, dua);
  if (!ok) { showToast('Could not send — please try again'); return; }

  // Show confirmation message
  document.getElementById('submit-area').innerHTML = `
    <div class="confirm-msg">
      <p style="font-size:1.5rem;margin-bottom:0.5rem;">🤲</p>
      <p style="font-weight:500;color:var(--accent-text);margin-bottom:0.4rem;">Your dua has been sent</p>
      <p class="text-sm">We will make sure it reaches them — may Allah accept your dua and grant you what you've asked for. Ameen.</p>
      <button class="btn btn-ghost" style="margin-top:0.75rem;" onclick="showRequestForm()">Send another</button>
    </div>`;

  // Refresh list data
  listData = await Sharing.getList(listId);
  const active = listData.requests.filter(r => !r.dismissed);
  document.getElementById('list-sub').textContent = `${active.length} dua request${active.length !== 1 ? 's' : ''} waiting`;
  document.getElementById('divider').style.display = '';
  const listEl = document.getElementById('requests-list');
  listEl.innerHTML = `<p class="text-muted text-sm mb-2" style="font-weight:500;">All requests (${active.length})</p>` +
    active.map(r => `
      <div class="request-card">
        <div class="requester-name">${esc(r.name)}</div>
        <div class="request-dua">${esc(r.dua)}</div>
        <p class="text-subtle text-sm mt-1">${new Date(r.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}</p>
      </div>`).join('');
}

async function saveReq(requestId, dua, name) {
  Library.addCustom({ custom_text: dua, translation: dua, arabic: '', label: name, shareListLabel: listData?.label || 'Shared Link', fromSharing: true, categories: ['general'] });
  await Sharing.markSaved(requestId);
  listData = await Sharing.getList(listId);
  showToast('Saved to your library 🤲');
  render();
}

async function dismissReq(requestId) {
  await Sharing.dismissRequest(requestId);
  listData = await Sharing.getList(listId);
  showToast('Request dismissed');
  render();
}
</script>
</body>
</html>
