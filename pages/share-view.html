  <title>Dua Requests — Amal</title>

  <style>
    .pilgrim-hero { text-align:center; padding: 2.5rem 0 1.5rem; }
    .kaaba-icon { font-size: 3rem; display:block; margin-bottom:0.75rem; }
    .request-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.1rem; margin-bottom:0.65rem; }
    .requester-name { font-weight:500; font-size:0.95rem; }
    .request-dua { color:var(--text-muted); font-size:0.9rem; margin-top:0.3rem; line-height:1.6; }
    .request-actions { display:flex; gap:0.5rem; margin-top:0.75rem; flex-wrap:wrap; }
  </style>
</head>
<body>

<main class="page">
  <div class="pilgrim-hero">
    <span class="kaaba-icon">🕋</span>
    <h1 id="list-title">Dua Requests</h1>
    <p id="list-sub" class="text-muted">Loading…</p>
  </div>

  <!-- Add a request form (hidden for owner) -->
  <div class="card" id="request-form">
    <h3 style="margin-bottom:0.75rem;">Send a dua request</h3>
    <div class="field">
      <label>Your name (optional)</label>
      <input type="text" id="req-name" placeholder="Anonymous">
    </div>
    <div class="field">
      <label>Your dua request</label>
      <textarea id="req-dua" placeholder="e.g. Please make dua for my mother's health…"></textarea>
    </div>
    <button class="btn btn-primary" onclick="submitRequest()">Send request 🤲</button>
  </div>

  <hr class="divider">

  <div id="requests-list"></div>

</main>

<footer>
  <p>Powered by <a href="../index.html">Amal</a> — <em>Hope has a home.</em></p>
</footer>

<nav>

    My Library

    Browse

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sync.js"></script>
<script src="../js/library.js"></script>
<script src="../js/sharing.js"></script>
<script>
let listId = null;
let isOwner = false;

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  listId = params.get('id');
  if (!listId) {
    document.getElementById('list-title').textContent = 'Link not found';
    document.getElementById('list-sub').textContent = 'This sharing link is invalid.';
    document.getElementById('request-form').style.display = 'none';
    return;
  }
  isOwner = Sharing.getMyIds().includes(listId);
  if (isOwner) document.getElementById('request-form').style.display = 'none';
  render();
});

function render() {
  const list = Sharing.getList(listId);
  if (!list) {
    document.getElementById('list-title').textContent = 'Link not found';
    document.getElementById('list-sub').textContent = 'This link may have been deleted or hasn\'t been set up yet.';
    document.getElementById('request-form').style.display = 'none';
    return;
  }

  document.title = list.label + ' — Amal';
  document.getElementById('list-title').textContent = list.label;

  const active = list.requests.filter(r => !r.dismissed);
  document.getElementById('list-sub').textContent = active.length
    ? `${active.length} dua request${active.length !== 1 ? 's' : ''} waiting`
    : isOwner ? 'No requests yet — share your link to receive duas' : 'No requests yet — be the first to send one';

  const el = document.getElementById('requests-list');
  if (!active.length) { el.innerHTML = ''; return; }

  el.innerHTML = (isOwner ? `<p class="text-muted text-sm mb-2" style="font-weight:500;">Tap a request to save it to your library</p>` : `<p class="text-muted text-sm mb-2" style="font-weight:500;">All requests (${active.length})</p>`) +
    active.map((r, visualIdx) => {
      const realIdx = list.requests.indexOf(r);
      const alreadySaved = Library.list().some(d => d.fromSharing && d.custom_text === r.dua && d.label === r.name);
      const actions = isOwner ? `
        <div class="request-actions">
          ${alreadySaved
            ? `<span class="tag" style="padding:0.4rem 0.9rem;">✓ Saved</span>`
            : `<button class="btn btn-primary" style="font-size:0.85rem;padding:0.4rem 0.9rem;" onclick="saveRequest(${realIdx})">Save to library</button>`}
          <button class="btn btn-ghost" style="font-size:0.85rem;padding:0.4rem 0.9rem;" onclick="dismissReq(${realIdx})">Dismiss</button>
        </div>` : '';
      return `
        <div class="request-card">
          <div class="requester-name">${esc(r.name)}</div>
          <div class="request-dua">${esc(r.dua)}</div>
          <p class="text-subtle text-sm mt-1">${new Date(r.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}</p>
          ${actions}
        </div>`;
    }).join('');
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function saveRequest(idx) {
  const list = Sharing.getList(listId);
  const r = list?.requests[idx];
  if (!r) return;
  Library.addCustom({
    custom_text: r.dua,
    label: r.name,
    fromSharing: true,
    categories: ['general']
  });
  showToast('Saved to your library 🤲');
  render();
}

function dismissReq(idx) {
  Sharing.dismissRequest(listId, idx);
  showToast('Request dismissed');
  render();
}

function submitRequest() {
  const name = document.getElementById('req-name').value.trim() || 'Anonymous';
  const dua = document.getElementById('req-dua').value.trim();
  if (!dua) { showToast('Please write your dua request'); return; }
  Sharing.addRequest(listId, name, dua);
  document.getElementById('req-name').value = '';
  document.getElementById('req-dua').value = '';
  showToast('Your request has been sent 🤲 Jazakallah khayran');
  render();
}
</script>
</body>
</html>
