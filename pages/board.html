<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dua Board — Amal</title>
  <meta name="theme-color" content="#A0601A">
  <link rel="manifest" href="../manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<main class="page">
  <div class="page-header">
    <h1>Dua Board</h1>
    <p>Post a dua request. Others can say Ameen on your behalf.</p>
  </div>

  <!-- Post a request -->
  <div class="card" id="post-form">
    <div class="field">
      <label>Your name (optional)</label>
      <input type="text" id="post-name" placeholder="Anonymous">
    </div>
    <div class="field">
      <label>Your dua request</label>
      <textarea id="post-dua" placeholder="Please make dua for…" style="min-height:80px;"></textarea>
    </div>
    <p class="text-subtle text-sm mb-2">Keep it sincere and respectful. No personal information please.</p>
    <button class="btn btn-primary" onclick="postDua()">Post request</button>
  </div>

  <hr class="divider">

  <div id="board-list"></div>
</main>

<footer>
  <p>Amal — <em>Hope has a home.</em> &nbsp;·&nbsp; Made with intention by <a href="https://amanahdigital.co.uk">Amanah Digital</a></p>
</footer>

<nav>
  <a href="../index.html" class="nav-brand">Amal</a>
  <a href="../index.html">

    Home

    Library

    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    Sharing

  <a href="board.html" class="active">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    Board
  </a>
</nav>

<div id="toast"></div>

<script src="../js/app.js"></script>
<script src="../js/board.js"></script>
<script>
document.addEventListener('DOMContentLoaded', render);

function render() {
  const posts = Board.getBoard();
  const el = document.getElementById('board-list');

  if (!posts.length) {
    el.innerHTML = `<div class="empty"><h3>No requests yet</h3><p>Be the first to post a dua request.</p></div>`;
    return;
  }

  el.innerHTML = posts.map(p => `
    <div class="card" id="post-${p.id}">
      <div class="flex justify-between items-center mb-1">
        <strong style="font-size:0.9rem;">${p.name}</strong>
        <span class="text-subtle text-sm">${Board.timeAgo(p.createdAt)}</span>
      </div>
      <p style="font-size:0.92rem;color:var(--text);line-height:1.65;">${p.dua}</p>
      <div class="flex items-center gap-1 mt-2">
        <button class="ameen-btn ${p.myAmeen ? 'tapped' : ''}" onclick="tapAmeen('${p.id}', this)">
          🤲 Ameen${p.ameen > 0 ? ' · ' + p.ameen : ''}
        </button>
      </div>
    </div>`).join('');
}

function postDua() {
  const name = document.getElementById('post-name').value.trim() || 'Anonymous';
  const dua = document.getElementById('post-dua').value.trim();
  if (!dua) { showToast('Please write your dua request'); return; }

  Board.post(name, dua);
  document.getElementById('post-name').value = '';
  document.getElementById('post-dua').value = '';
  showToast('Posted — may Allah accept 🌿');
  render();
}

function tapAmeen(id, btn) {
  const post = Board.tapAmeen(id);
  if (!post) return;
  btn.className = 'ameen-btn ' + (post.myAmeen ? 'tapped' : '');
  btn.innerHTML = `🤲 Ameen${post.ameen > 0 ? ' · ' + post.ameen : ''}`;
}
</script>
</body>
</html>
