<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || sessionStorage.getItem('amal_dua_id');
  if (!id) { history.back(); return; }

  const duas = await loadDuas();
  const libEntry = Library.getAll()[id];

  let dua = duas.find(d => d.id === id) || libEntry;
  if (!dua) { document.getElementById('content').innerHTML = `<div class="empty"><h3>Dua not found</h3></div>`; return; }

  document.title = 'Dua — Amal';
  render(dua);
});

function render(dua) {
  const saved = Library.isSaved(dua.id);
  const answered = Library.isAnswered(dua.id);
  const cats = (dua.categories || []).map(c => `<span class="tag">${CATEGORIES[c]?.label || c}</span>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="dua-full">
      ${dua.arabic ? `<div class="arabic" style="margin-bottom:1rem;">${dua.arabic}</div>` : ''}
      ${dua.transliteration ? `<div class="transliteration" style="margin-bottom:1rem;">${dua.transliteration}</div>` : ''}
      ${dua.translation || dua.custom_text ? `<p style="font-size:1rem;color:var(--text);line-height:1.75;">${dua.translation || dua.custom_text}</p>` : ''}
      ${dua.occasion ? `<p class="text-sm text-muted mt-2"><strong>Occasion:</strong> ${dua.occasion}</p>` : ''}
      ${dua.source ? `<p class="source-tag mt-2">Source: ${dua.source}</p>` : ''}
      ${dua.fromSharing ? `<p class="text-sm text-muted mt-2">🤲 Requested by ${dua.label || 'Anonymous'} · <em>${dua.shareListLabel || 'Shared Link'}</em></p>` : ''}
      <div class="dua-meta mt-2">${cats}</div>
    </div>

    ${answered ? `<div class="card" style="background:var(--accent-light);border-color:var(--accent)">
      <div class="flex items-center gap-1">
        <span class="answered-badge">✓ Answered — Alhamdulillah</span>
      </div>
      <button class="btn btn-ghost mt-2 text-sm" onclick="unmarkAnswered('${dua.id}')">Undo</button>
    </div>` : ''}

    <div class="action-row">
      ${saved ? `
        ${!answered ? `<button class="btn btn-primary" onclick="markAnswered('${dua.id}')">✓ Mark as answered</button>` : ''}
        <button class="btn" onclick="unsave('${dua.id}')">Remove from library</button>
      ` : `
        <button class="btn btn-primary" onclick="saveDua()">Save to library</button>
      `}
      <button class="btn" onclick="copyDua()">Copy</button>
    </div>

    <hr class="divider">
    <p class="text-sm text-muted">Going on Umrah? <a href="share.html" style="color:var(--accent)">Create a sharing link</a> so others can send you duas to make on their behalf.</p>
  `;

  window._currentDua = dua;
}

async function saveDua() {
  Library.save(window._currentDua);
  showToast('Saved to your library');
  render(window._currentDua);
}

function unsave(id) {
  Library.remove(id);
  showToast('Removed from library');
  render(window._currentDua);
}

function markAnswered(id) {
  Library.markAnswered(id);
  showToast('Alhamdulillah 🌿');
  render(window._currentDua);
}

function unmarkAnswered(id) {
  Library.unmarkAnswered(id);
  render(window._currentDua);
}

function copyDua() {
  const d = window._currentDua;
  const parts = [];
  if (d.arabic) parts.push(d.arabic);
  if (d.transliteration) parts.push(d.transliteration);
  if (d.translation || d.custom_text) parts.push(d.translation || d.custom_text);
  if (d.source) parts.push('Source: ' + d.source);
  navigator.clipboard.writeText(parts.join('\n\n')).then(() => showToast('Copied to clipboard'));
}
</script>
