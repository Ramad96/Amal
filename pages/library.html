<!DOCTYPE html>

<body>

<main class="page">
  <div class="page-header">
    <h1>My Library</h1>
    <p>Your saved duas and personal supplications</p>
  </div>

  <!-- Add custom dua -->
  <div id="add-form" style="display:none;">
    <div class="card">
      <h3 style="margin-bottom:1rem;">Add a personal dua</h3>
      <div class="field">
        <label>Your dua (Arabic, transliteration, or your own words)</label>
        <textarea id="custom-text" placeholder="Write your dua here…"></textarea>
      </div>
      <div class="field">
        <label>Label (optional)</label>
        <input type="text" id="custom-label" placeholder="e.g. For my family">
      </div>
      <div class="flex gap-1" style="flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="saveCustom()">Save dua</button>
        <button class="btn btn-ghost" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="flex justify-between items-center mb-2">
    <div class="chips" id="lib-tabs" style="margin-bottom:0;">
      <button class="chip active" onclick="switchTab('active', this)">Active</button>
      <button class="chip" onclick="switchTab('answered', this)">Answered</button>
    </div>
    <button class="btn btn-ghost text-sm" onclick="toggleAddForm()" id="add-btn">+ Add dua</button>
  </div>

  <div id="list"></div>
</main>

<footer>
  <p>Amal — <em>Hope has a home.</em> &nbsp;·&nbsp; Made with intention by <a href="https://amanahdigital.co.uk">Amanah Digital</a></p>
</footer>

<div id="toast"></div>

<script src="../js/app.js"></script>
<script src="../js/library.js"></script>
<script>
let currentTab = 'active';

document.addEventListener('DOMContentLoaded', render);

function render() {
  const items = currentTab === 'active' ? Library.listActive() : Library.listAnswered();
  const list = document.getElementById('list');

  if (!items.length) {
    list.innerHTML = currentTab === 'active'
      ? `<div class="empty"><h3>No saved duas yet</h3><p>Browse prophetic duas and save the ones you want to keep close.</p><a href="browse.html" class="btn mt-2">Browse duas</a></div>`
      : `<div class="empty"><h3>No answered duas yet</h3><p>When Allah answers a dua, mark it here as a reminder of His mercy.</p></div>`;
    return;
  }

  list.innerHTML = items.map(d => {
    const preview = d.translation || d.arabic || d.custom_text || '';
    const isAnswered = d.answered;
    return `
      <div class="card">
        <div class="card-row">
          <div style="flex:1;min-width:0;" onclick="openDua('${d.id}')" style="cursor:pointer;">
            ${d.arabic ? `<div class="dua-arabic" style="font-size:1.1rem;line-height:1.8;">${d.arabic}</div>` : ''}
            ${d.custom_text ? `<p style="color:var(--text);font-size:0.95rem;">${d.custom_text}</p>` : ''}
            <p class="text-sm text-muted mt-1" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${preview}</p>
            ${d.label ? `<span class="tag muted mt-1">${d.label}</span>` : ''}
            ${isAnswered && d.answeredAt ? `<p class="text-subtle text-sm mt-1">Answered ${new Date(d.answeredAt).toLocaleDateString()}</p>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:0.4rem;align-items:flex-end;">
            ${!isAnswered ? `<button class="btn btn-ghost text-sm" onclick="markAnswered('${d.id}')">✓ Answered</button>` : ''}
            <button class="btn btn-ghost text-sm" onclick="removeDua('${d.id}')">Remove</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('#lib-tabs .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleAddForm() {
  const form = document.getElementById('add-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function saveCustom() {
  const text = document.getElementById('custom-text').value.trim();
  const label = document.getElementById('custom-label').value.trim();
  if (!text) { showToast('Please write your dua first'); return; }
  Library.addCustom({ custom_text: text, label, translation: text, arabic: '', categories: ['general'] });
  document.getElementById('custom-text').value = '';
  document.getElementById('custom-label').value = '';
  toggleAddForm();
  showToast('Dua saved');
  render();
}

function markAnswered(id) {
  Library.markAnswered(id);
  showToast('Alhamdulillah 🌿');
  render();
}

function removeDua(id) {
  Library.remove(id);
  showToast('Removed');
  render();
}
</script>
</body>
</html>
